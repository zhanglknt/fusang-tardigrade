# Fusang Web Server - Conda Environment
# ======================================
#
# Create environment:
#   conda env create -f environment.yml
#
# Activate environment:
#   conda activate fusang-web
#
# Start web server:
#   fusang-web
#
# Custom port:
#   fusang-web --port 8080 --host 0.0.0.0

name: fusang-web
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python >=3.8,<3.14
  - pip
  - numpy >=1.20.0
  - numba >=0.55.0
  - biopython >=1.79
  - scipy >=1.7.0
  - flask >=2.0.0

  # For development / production
  - gunicorn >=21.0.0          # Production WSGI server (Linux/macOS)
  - waitress >=3.0.0           # Production WSGI server (cross-platform)

  # Pip-installed extra dependencies
  - pip:
      - -e .                    # Install fusang-web in development mode
